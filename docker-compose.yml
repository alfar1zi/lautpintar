services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lautpintar
      POSTGRES_USER: lautpintar
      POSTGRES_PASSWORD: lautpintar123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
